<style>
* { box-sizing: border-box; }
.search-wrap { display:flex; align-items:center; gap:8px; margin-bottom:1rem; }
.search-wrap i { font-size:16px; color:var(--color-text-tertiary); }
#search { flex:1; }
.stats { font-size:12px; color:var(--color-text-tertiary); white-space:nowrap; }
.domain-section { margin-bottom:1.5rem; }
.domain-header {
  display:flex; align-items:center; gap:8px;
  padding:6px 10px; border-radius:var(--border-radius-md);
  margin-bottom:6px; cursor:pointer; user-select:none;
}
.domain-header i { font-size:15px; }
.domain-title { font-size:13px; font-weight:500; flex:1; }
.domain-count { font-size:11px; opacity:.7; }
.domain-chevron { font-size:12px; transition:transform .2s; }
.domain-section.collapsed .domain-chevron { transform:rotate(-90deg); }
.domain-section.collapsed .tables-grid { display:none; }
.tables-grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:6px;
  padding:2px 0 4px;
}
.table-card {
  background:var(--color-background-primary);
  border:0.5px solid var(--color-border-tertiary);
  border-radius:var(--border-radius-md);
  padding:8px 10px;
  cursor:pointer;
  transition:border-color .15s, background .15s;
}
.table-card:hover { border-color:var(--color-border-secondary); background:var(--color-background-secondary); }
.table-card.hidden { display:none; }
.table-name { font-size:12px; font-weight:500; color:var(--color-text-primary); font-family:var(--font-mono); }
.table-cols { font-size:11px; color:var(--color-text-tertiary); margin-top:2px; }
.table-desc { font-size:11px; color:var(--color-text-secondary); margin-top:3px; line-height:1.4; }
.no-results { font-size:13px; color:var(--color-text-tertiary); padding:2rem 0; text-align:center; }
.key-badge {

}
.pk { background:#E1F5EE; color:#085041; }
.fk { background:#EEEDFE; color:#3C3489; }
.cols-detail { margin-top:6px; }
.col-row { display:flex; align-items:baseline; gap:4px; padding:2px 0; border-bottom:0.5px solid var(--color-border-tertiary); font-size:11px; }
.col-row:last-child { border-bottom:none; }
.col-name { font-family:var(--font-mono); color:var(--color-text-primary); font-size:11px; flex:1; }
.col-type { color:var(--color-text-tertiary); font-size:10px; }
.expanded .cols-detail { display:block; }
.collapsed-card .cols-detail { display:none; }
</style>

function renderAll() {
  const container = document.getElementById('domains');
  container.innerHTML = '';
  let total = 0;
  DOMAINS.forEach(d => {
    total += d.tables.length;
    const sec = document.createElement('div');
    sec.className = 'domain-section';
    sec.dataset.domain = d.key;
    sec.innerHTML = `
      <div class="domain-header" style="background:${d.color.bg};color:${d.color.txt}" onclick="toggleSection(this.parentElement)">
        <i class="ti ${d.icon}" aria-hidden="true"></i>
        <span class="domain-title">${d.label}</span>
        <span class="domain-count">${d.tables.length} tables</span>
        <i class="ti ti-chevron-down domain-chevron" aria-hidden="true"></i>
      </div>
      <div class="tables-grid">${d.tables.map(t => renderCard(t, d)).join('')}</div>
    `;
    container.appendChild(sec);
  });
  document.getElementById('stats').textContent = total + ' tables';
}

function renderCard(t, d) {
  return `<div class="table-card collapsed-card" data-table="${t.name}" data-desc="${t.desc}" onclick="toggleCard(this,'${d.key}','${t.name}')">
    <div class="table-name">${t.name}</div>
    <div class="table-cols">${t.cols} columns</div>
    <div class="table-desc">${t.desc}</div>
    <div class="cols-detail">${t.fields.map(f => `
      <div class="col-row">
        <span class="col-name">${f.n}${f.k ? `<span class="key-badge ${f.k.toLowerCase()}">${f.k}</span>` : ''}</span>
        <span class="col-type">${f.t}</span>
      </div>`).join('')}
    </div>
  </div>`;
}

function toggleCard(el, domain, tname) {
  const isExp = el.classList.contains('expanded');
  if (isExp) {
    el.classList.remove('expanded');
    el.classList.add('collapsed-card');
  } else {
    el.classList.add('expanded');
    el.classList.remove('collapsed-card');
  }
}

function toggleSection(sec) {
  sec.classList.toggle('collapsed');
}

function doSearch(q) {
  q = q.toLowerCase().trim();
  let visible = 0;
  DOMAINS.forEach(d => {
    const sec = document.querySelector(`.domain-section[data-domain="${d.key}"]`);
    let domainVisible = 0;
    sec.querySelectorAll('.table-card').forEach((card, i) => {
      const t = d.tables[i];
      const match = !q || t.name.includes(q) || t.desc.toLowerCase().includes(q) || t.fields.some(f => f.n.includes(q) || f.t.includes(q));
      card.classList.toggle('hidden', !match);
      if (match) { domainVisible++; visible++; }
    });
    sec.style.display = domainVisible === 0 ? 'none' : '';
    if (q && domainVisible > 0) sec.classList.remove('collapsed');
  });
  document.getElementById('no-results').style.display = visible === 0 ? '' : 'none';
  document.getElementById('stats').textContent = (q ? visible + ' matching' : '63') + ' tables';
}

renderAll();
</script>
